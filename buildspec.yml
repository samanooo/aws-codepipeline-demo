phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 368048665467.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t demo/flask-app .
      - docker tag demo/flask-app:latest 368048665467.dkr.ecr.us-east-1.amazonaws.com/demo/flask-app:latest

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push 368048665467.dkr.ecr.us-east-1.amazonaws.com/demo/flask-app:latest